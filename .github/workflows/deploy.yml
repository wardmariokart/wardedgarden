name: Deploy to EC2

on:
  push:
    branches:
      - trunk # or main/master depending on your branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' # Use your project's Node.js version
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_EC2_PRIVATE_KEY }}
        
    - name: Add EC2 host to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 13.60.52.145 >> ~/.ssh/known_hosts
      
    - name: Deploy to EC2
      run: |
        # Remove existing app directory
        ssh sudo ubuntu@13.60.52.145 'rm -rf /app/'
        
        # Create app directory
        ssh sudo ubuntu@13.60.52.145 'mkdir -p /app/'
        
        # Copy files to EC2
        scp -r dist/* ubuntu@13.60.52.145:/app/
        scp package.json package-lock.json server.js ubuntu@13.60.52.145:/app/
        
        # Install production dependencies on the EC2 instance
        ssh subuntu@13.60.52.145 'cd /app && npm ci --only=production'
        
        # Restart PM2 and potentially Nginx
        ssh ubuntu@13.60.52.145 'cd /app && pm2 restart all'